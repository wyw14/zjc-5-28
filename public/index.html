<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>口算打怪</title>
  <link rel="stylesheet" href="/style.css" />
</head>
<body>
  <div id="app">
    <div id="hud">
      <div id="hp-bar-wrap"><div id="hp-bar"></div></div>
      <span id="hp-text">❤️ 5 / 5</span>
      <span id="score-text">🏆 0</span>
      <span id="progress-text">0 / 50</span>
      <button id="give-up-btn">放弃</button>
    </div>

    <canvas id="game-canvas"></canvas>

    <div id="question-area">
      <span id="question-text"></span>
    </div>

    <div id="options-area">
      <button class="option-btn" data-idx="0"></button>
      <button class="option-btn" data-idx="1"></button>
      <button class="option-btn" data-idx="2"></button>
    </div>

    <div id="overlay">
      <div id="overlay-box">
        <h1 id="overlay-title">口算打怪</h1>
        <p id="overlay-msg">消灭怪物，保卫城堡！</p>
        <button id="start-btn">开始游戏</button>
      </div>
    </div>

    <div id="confirm-overlay" class="hidden">
      <div id="confirm-box">
        <h2 id="confirm-title">确认放弃？</h2>
        <p id="confirm-msg">放弃后将按当前成绩结算，不能继续答题。</p>
        <div id="confirm-buttons">
          <button id="confirm-cancel">取消</button>
          <button id="confirm-ok">确认放弃</button>
        </div>
      </div>
    </div>
  </div>

  <script src="/game.js"></script>
</body>
</html>
